# Render.com deployment config (Infrastructure as Code).
# Pushing this file lets you create the service via "Blueprint" on Render.
services:
  - type: web
    name: live-code-collab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: CORS_ORIGINS
        value: "*"
